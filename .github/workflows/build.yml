name: Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Create Release Notes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag matches Cargo.toml version
        shell: bash
        run: |
          version=$(grep -m1 '^version\s*=\s*"' Cargo.toml | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          if [ -z "$version" ]; then
            echo "Could not read version from Cargo.toml"
            exit 1
          fi

          expected_tag="v${version}"
          actual_tag="${GITHUB_REF_NAME}"

          echo "Cargo.toml version: ${version}"
          echo "Expected tag: ${expected_tag}"
          echo "Actual tag: ${actual_tag}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Tag does not match Cargo.toml version"
            exit 1
          fi

      - name: Create GitHub Release with commit summary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"

          gh release view "$tag" --repo "$repo" >/dev/null 2>&1 || \
            gh release create "$tag" --repo "$repo" --title "$tag" --generate-notes

  windows:
    name: Windows (binary)
    runs-on: windows-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload Windows binary to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"

          gh release upload $tag "target/release/ferrosonic.exe#ferrosonic-windows-x86_64.exe" --repo $repo --clobber

  linux:
    name: Linux (binary + deb)
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build deb package
        run: cargo deb --no-build --no-strip

      - name: Upload Linux assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"

          gh release upload "$tag" \
            "target/release/ferrosonic#ferrosonic-linux-x86_64" \
            target/debian/*.deb \
            --repo "$repo" \
            --clobber

  bump-master-version:
    name: Bump Cargo.toml on master
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Bump to next patch version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          current="${tag#v}"

          if ! [[ "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be semver like v1.2.3"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current"
          next_patch=$((patch + 1))
          next_version="${major}.${minor}.${next_patch}"

          echo "Current version: ${current}"
          echo "Next version: ${next_version}"

          sed -E -i "0,/^version\s*=\s*\"[^\"]+\"/s//version = \"${next_version}\"/" Cargo.toml

          if git diff --quiet Cargo.toml; then
            echo "No changes in Cargo.toml"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${next_version} [skip ci]"
          git push origin HEAD:master